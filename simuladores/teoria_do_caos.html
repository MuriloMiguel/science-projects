<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pêndulo Duplo — Teoria do Caos</title>
<style>
    * { box-sizing: border-box; }
    html, body {
        margin: 0;
        height: 100%;
        background: #000;
        color: #ddd;
        font-family: monospace;
        overflow: hidden;
    }
    #app {
        display: flex;
        height: 100%;
    }
    #canvasWrap {
        flex: 1;
        position: relative;
        min-width: 0;
    }
    canvas {
        display: block;
        width: 100%;
        height: 100%;
    }
    #sidebar {
        width: 220px;
        flex-shrink: 0;
        background: #000;
        border-left: 1px solid #333;
        padding: 14px 12px;
        overflow-y: auto;
    }
    #sidebar h2 {
        font-size: 13px;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: #fff;
        margin: 0 0 14px 0;
        font-weight: normal;
    }
    .ctrl {
        margin-bottom: 12px;
    }
    .ctrl label {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        color: #999;
        margin-bottom: 3px;
    }
    .ctrl label span.val { color: #6cf; }
    .ctrl input[type=range] {
        width: 100%;
    }
    .ctrl.check {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: #999;
    }
    .btnrow {
        display: flex;
        gap: 6px;
        margin-top: 16px;
    }
    button {
        flex: 1;
        background: #111;
        color: #ccc;
        border: 1px solid #444;
        padding: 6px 4px;
        cursor: pointer;
        font-family: monospace;
        font-size: 11px;
    }
    button:hover { background: #222; }
    a.back {
        display: block;
        color: #6cf;
        text-decoration: none;
        font-size: 11px;
        margin-bottom: 16px;
    }

    @media (max-width: 700px) {
        #app { flex-direction: column; }
        #sidebar {
            width: 100%;
            height: 42%;
            border-left: none;
            border-top: 1px solid #333;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0 12px;
            align-content: start;
        }
        #sidebar h2 { grid-column: 1 / -1; margin-bottom: 8px; }
        .btnrow { grid-column: 1 / -1; }
    }
</style>
</head>
<body>

<div id="app">
    <div id="canvasWrap">
        <canvas id="c"></canvas>
    </div>
    <div id="sidebar">
        <a class="back" href="../index.html">&larr; voltar</a>
        <h2>Controladores</h2>

        <div class="ctrl">
            <label>n° pêndulos <span class="val" id="nVal">8</span></label>
            <input id="n" type="range" min="1" max="40" step="1" value="8">
        </div>
        <div class="ctrl">
            <label>velocidade <span class="val" id="speedVal">1.0x</span></label>
            <input id="speed" type="range" min="0.1" max="5" step="0.1" value="1">
        </div>
        <div class="ctrl">
            <label>gravidade (g) <span class="val" id="gVal">9.8</span></label>
            <input id="g" type="range" min="1" max="25" step="0.5" value="9.8">
        </div>
        <div class="ctrl">
            <label>comprimento L1 <span class="val" id="l1Val">120</span></label>
            <input id="l1" type="range" min="50" max="200" step="5" value="120">
        </div>
        <div class="ctrl">
            <label>comprimento L2 <span class="val" id="l2Val">120</span></label>
            <input id="l2" type="range" min="50" max="200" step="5" value="120">
        </div>
        <div class="ctrl">
            <label>massa m1 <span class="val" id="m1Val">10</span></label>
            <input id="m1" type="range" min="1" max="30" step="1" value="10">
        </div>
        <div class="ctrl">
            <label>massa m2 <span class="val" id="m2Val">10</span></label>
            <input id="m2" type="range" min="1" max="30" step="1" value="10">
        </div>
        <div class="ctrl">
            <label>Δθ inicial <span class="val" id="spreadVal">0.005</span></label>
            <input id="spread" type="range" min="0" max="0.05" step="0.001" value="0.005">
        </div>
        <div class="ctrl check">
            <input id="trail" type="checkbox" checked>
            <label style="margin:0;">rastro</label>
        </div>

        <div class="btnrow">
            <button id="pause">pausar</button>
            <button id="reset">reiniciar</button>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const canvasWrap = document.getElementById('canvasWrap');

let originX = 0, originY = 0;

function resize() {
    const rect = canvasWrap.getBoundingClientRect();
    const w = Math.max(1, Math.round(rect.width));
    const h = Math.max(1, Math.round(rect.height));
    if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w;
        canvas.height = h;
    }
    originX = canvas.width / 2;
    originY = canvas.height * 0.25;
}

// ResizeObserver acompanha mudanças de tamanho do container (inclusive
// as causadas por media queries no layout mobile), o que o evento
// "resize" da window sozinho não cobre de forma confiável.
new ResizeObserver(resize).observe(canvasWrap);
resize();

const el = id => document.getElementById(id);
const nEl = el('n'), speedEl = el('speed'), gEl = el('g'), l1El = el('l1'), l2El = el('l2'),
      m1El = el('m1'), m2El = el('m2'), spreadEl = el('spread'), trailChk = el('trail');
const nVal = el('nVal'), speedVal = el('speedVal'), gVal = el('gVal'), l1Val = el('l1Val'),
      l2Val = el('l2Val'), m1Val = el('m1Val'), m2Val = el('m2Val'), spreadVal = el('spreadVal');
const pauseBtn = el('pause'), resetBtn = el('reset');

let paused = false;
let pendulums = [];

function colorFor(i, total) {
    const hue = total <= 1 ? 200 : (i / total) * 300;
    return `hsl(${hue}, 90%, 60%)`;
}

class Pendulum {
    constructor(a1, a2, color) {
        this.a1 = a1;
        this.a2 = a2;
        this.a1v = 0;
        this.a2v = 0;
        this.color = color;
        this.trail = [];
    }
    step(dt) {
        const g = parseFloat(gEl.value);
        const L1 = parseFloat(l1El.value);
        const L2 = parseFloat(l2El.value);
        const m1 = parseFloat(m1El.value);
        const m2 = parseFloat(m2El.value);
        const { a1, a2, a1v, a2v } = this;

        const num1 = -g * (2 * m1 + m2) * Math.sin(a1)
            - m2 * g * Math.sin(a1 - 2 * a2)
            - 2 * Math.sin(a1 - a2) * m2 * (a2v * a2v * L2 + a1v * a1v * L1 * Math.cos(a1 - a2));
        const den1 = L1 * (2 * m1 + m2 - m2 * Math.cos(2 * a1 - 2 * a2));
        const a1a = num1 / den1;

        const num2 = 2 * Math.sin(a1 - a2) * (a1v * a1v * L1 * (m1 + m2)
            + g * (m1 + m2) * Math.cos(a1)
            + a2v * a2v * L2 * m2 * Math.cos(a1 - a2));
        const den2 = L2 * (2 * m1 + m2 - m2 * Math.cos(2 * a1 - 2 * a2));
        const a2a = num2 / den2;

        this.a1v += a1a * dt;
        this.a2v += a2a * dt;
        this.a1 += this.a1v * dt;
        this.a2 += this.a2v * dt;
    }
    positions() {
        const L1 = parseFloat(l1El.value);
        const L2 = parseFloat(l2El.value);
        const x1 = originX + L1 * Math.sin(this.a1);
        const y1 = originY + L1 * Math.cos(this.a1);
        const x2 = x1 + L2 * Math.sin(this.a2);
        const y2 = y1 + L2 * Math.cos(this.a2);
        return { x1, y1, x2, y2 };
    }
    draw() {
        const { x1, y1, x2, y2 } = this.positions();
        const m1 = parseFloat(m1El.value);
        const m2 = parseFloat(m2El.value);

        if (trailChk.checked) {
            this.trail.push({ x: x2, y: y2 });
            if (this.trail.length > 400) this.trail.shift();
            ctx.beginPath();
            for (let i = 0; i < this.trail.length; i++) {
                const p = this.trail[i];
                if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
            }
            ctx.strokeStyle = this.color;
            ctx.globalAlpha = 0.35;
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.globalAlpha = 1;
        }

        ctx.beginPath();
        ctx.moveTo(originX, originY);
        ctx.lineTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 1.3;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(x1, y1, 2 + m1 * 0.3, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(x2, y2, 2 + m2 * 0.3, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
    }
}

function initPendulums() {
    originX = canvas.width / 2;
    originY = canvas.height * 0.25;
    const start = Math.PI / 2;
    const n = parseInt(nEl.value);
    const spread = parseFloat(spreadEl.value);
    pendulums = [];
    for (let i = 0; i < n; i++) {
        const offset = n === 1 ? 0 : (i - (n - 1) / 2) * (spread / Math.max(1, n - 1)) * 2;
        pendulums.push(new Pendulum(start + offset, start, colorFor(i, n)));
    }
}
initPendulums();

function updateLabels() {
    nVal.textContent = nEl.value;
    speedVal.textContent = parseFloat(speedEl.value).toFixed(1) + 'x';
    gVal.textContent = gEl.value;
    l1Val.textContent = l1El.value;
    l2Val.textContent = l2El.value;
    m1Val.textContent = m1El.value;
    m2Val.textContent = m2El.value;
    spreadVal.textContent = parseFloat(spreadEl.value).toFixed(3);
}
updateLabels();

function loop() {
    if (!trailChk.checked) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    } else {
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    if (!paused) {
        const speed = parseFloat(speedEl.value);
        const baseDt = 0.005;
        const steps = Math.max(1, Math.round(4 * speed));
        for (let s = 0; s < steps; s++) {
            for (const p of pendulums) p.step(baseDt);
        }
    }

    for (const p of pendulums) p.draw();

    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

pauseBtn.addEventListener('click', () => {
    paused = !paused;
    pauseBtn.textContent = paused ? 'continuar' : 'pausar';
});
resetBtn.addEventListener('click', () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    initPendulums();
});
nEl.addEventListener('input', () => {
    updateLabels();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    initPendulums();
});
speedEl.addEventListener('input', updateLabels);
spreadEl.addEventListener('input', updateLabels);
spreadEl.addEventListener('change', () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    initPendulums();
});
[gEl, l1El, l2El, m1El, m2El].forEach(inp =>
    inp.addEventListener('input', () => {
        updateLabels();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    })
);
</script>
</body>
</html>
